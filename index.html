<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>QR Generator</title>
    <meta name="description" content="Open-source QR generator">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-GLhlTQ8iRABdZLl6O3oVMWSktQOp6b7In1Zl3/Jr59b6EGGoI1aFkw7cmDA6j6gD" crossorigin="anonymous">
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/merge-images/2.0.0/index.umd.min.js" integrity="sha512-CucGNBSd0heUFsbvPI5vFv+vTTAu8IoiFzzXpt1MEa5zfOb+j8Sz1ukN89tyL/+UySg7FqKEkq+PbPNwkIbdbw==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
  </head>
  <body>
    <!-- Neural Network Background -->
    <div class="neural-bg" id="neural-bg">
      <svg class="neural-svg" viewBox="0 0 800 600" preserveAspectRatio="xMidYMid slice"></svg>
    </div>

    <div class="wrapper">
      <header class="header">
        <div class="header-top">
          <div class="header-title">
            <span class="title-prompt">~/joie$</span>
            <h1 class="title-text">qr-gen</h1>
            <span class="cursor-blink"></span>
          </div>
          <a class="github-link" href="https://github.com/joiellantero/qr-generator" target="_blank" rel="noopener">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/></svg>
            Source
          </a>
        </div>
        <p class="privacy-note">Open source & privacy-first — no data collected.</p>
      </header>

      <form id="fqr">
        <div class="url-group">
          <label for="furl" class="form-label">URL</label>
          <input type="url" class="form-control" id="furl" placeholder="" required>
          <span class="input-hint">Tip: use <code>mailto:</code> for lost &amp; found QR codes</span>
        </div>

        <details class="options-toggle">
          <summary>Options</summary>
          <div class="options-grid">
            <div class="option-field">
              <label for="ftheme" class="form-label">Theme</label>
              <select class="form-select" id="ftheme" aria-label="Select theme">
                <option value="none">None</option>
                <option value="candy">Candy</option>
                <option value="coffee">Coffee</option>
                <option value="cherry">Cherry</option>
                <option value="forest">Forest</option>
                <option value="bee">Bee</option>
                <option value="warbler">Warbler</option>
                <option value="orange">Orange</option>
              </select>
            </div>
            <div class="option-field">
              <label for="fsize" class="form-label">Size</label>
              <select class="form-select" id="fsize" aria-label="Select Size">
                <option value="128" selected>128</option>
                <option value="256">256</option>
                <option value="512">512</option>
                <option value="1024">1024</option>
              </select>
            </div>
            <div class="option-field">
              <label for="fcolordark" class="form-label">Foreground</label>
              <input type="color" class="form-control form-control-color" id="fcolordark" value="#000000" title="Choose your color">
            </div>
            <div class="option-field">
              <label for="fcolorlight" class="form-label">Background</label>
              <input type="color" class="form-control form-control-color" id="fcolorlight" value="#ffffff" title="Choose your color">
            </div>
            <div class="option-field option-field--full">
              <label for="fbgimage" class="form-label">Background Image</label>
              <div class="file-upload" id="file-upload-area">
                <input type="file" id="fbgimage" accept="image/png, image/jpeg, image/webp" hidden>
                <span class="file-upload-text" id="file-upload-text">Drop image or click to upload</span>
                <button type="button" class="file-upload-clear" id="file-upload-clear" hidden>&times;</button>
              </div>
            </div>
          </div>
        </details>

        <div class="btn-gradient-wrap">
          <button type="submit" class="btn-generate" value="submit">Generate <span class="btn-arrow">→</span></button>
        </div>
      </form>

      <div id="qr"></div>
    </div>

    <footer class="footer">
      <a href="https://sudojoie.com" target="_blank" rel="noopener">sudojoie.com</a>
      <span class="footer-sep">·</span>
      <a href="https://ko-fi.com/joiel" target="_blank" rel="noopener">Buy me a coffee ☕</a>
    </footer>
    
    <script src="script.js" type="module" defer></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js" integrity="sha512-CNgIRecGo7nphbeZ04Sc13ka07paqdeTu0WR1IM4kNcpmBAUSHSQX0FslNhTDadL4O5SAGapGt4FodqL8My0mA==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js" integrity="sha384-w76AqPfDkMBDXo30jS1Sgez6pr3x5MlQ1ZAGC+nuZB+EYdgRZgiwxhTBTkF7CXvN" crossorigin="anonymous"></script>
    <script>
      // Neural network background
      (function() {
        const svg = document.querySelector('.neural-svg');
        const nodes = Array.from({ length: 50 }, (_, i) => ({
          x: Math.random() * 800,
          y: Math.random() * 600,
          id: 'node-' + i
        }));

        const lines = [];
        nodes.forEach((node, i) => {
          nodes.forEach((other, j) => {
            if (i >= j) return;
            const dist = Math.sqrt(Math.pow(node.x - other.x, 2) + Math.pow(node.y - other.y, 2));
            if (dist < 120 && Math.random() > 0.5) {
              lines.push({ x1: node.x, y1: node.y, x2: other.x, y2: other.y, delay: Math.random() * 8 });
            }
          });
        });

        lines.forEach((l, i) => {
          const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
          line.setAttribute('x1', l.x1);
          line.setAttribute('y1', l.y1);
          line.setAttribute('x2', l.x2);
          line.setAttribute('y2', l.y2);
          line.setAttribute('stroke', '#75a0f5');
          line.setAttribute('stroke-width', '0.5');
          line.classList.add('neural-line');
          line.style.animationDelay = l.delay + 's';
          svg.appendChild(line);
        });

        nodes.forEach(n => {
          const circle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
          circle.setAttribute('cx', n.x);
          circle.setAttribute('cy', n.y);
          circle.setAttribute('r', '2');
          circle.setAttribute('fill', '#75a0f5');
          circle.classList.add('neural-node');
          circle.style.animationDelay = (Math.random() * 4) + 's';
          svg.appendChild(circle);
        });
      })();
    </script>
  </body>
</html>
